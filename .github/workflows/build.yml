name: Build
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build:all
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: build dist and registry"
          file_pattern: "dist/ public/"
